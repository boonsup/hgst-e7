name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Python smoke tests ────────────────────────────────────────────────
  smoke-test:
    name: Python ${{ matrix.python-version }} smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check — all simulation modules
        run: |
          for f in simulation/*.py; do python -m py_compile "$f" && echo "OK $f"; done

      - name: Smoke test — su2_l10_colab.py (L=4, 2 sweeps)
        run: |
          python - << 'EOF'
          import ast, sys
          with open("simulation/su2_l10_colab.py", encoding="utf-8") as f:
              src = f.read()
          ast.parse(src)

          # Patch to tiny run
          src = src.replace("L       = 10", "L       = 4")
          src = src.replace("N_THERM = 4000", "N_THERM = 2")
          src = src.replace("N_MEAS  = 500",  "N_MEAS  = 2")
          src = src.replace("N_SKIP  = 5",    "N_SKIP  = 1")
          exec(src, {"__name__": "__main__"})

          import json
          with open("su2_l10_summary.json") as f:
              r = json.load(f)
          assert r["stub_mode"] == False, "stub_mode must be False"
          assert 0.0 < r["R_mean"] < 1.0, f"R_mean out of range: {r['R_mean']}"
          print(f"PASS  R_mean={r['R_mean']:.4f}  tau_int={r['tau_int']}")
          EOF

      - name: Verify data files are valid JSON
        run: |
          python -c "
          import json, pathlib, sys
          errors = []
          for f in pathlib.Path('data').glob('*.json'):
              try:
                  json.loads(f.read_text(encoding='utf-8'))
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\\n'.join(errors)); sys.exit(1)
          print(f'All {len(list(pathlib.Path(\"data\").glob(\"*.json\")))} JSON files valid')
          "

      - name: Canonical regression — guard committed R_inf values
        run: |
          python - << 'EOF'
          import json, pathlib, sys

          CANONICAL = {
              # file                          key           expected     tol
              "data/su2_l10_summary.json":   [("R_mean",   0.3598,     0.010)],
              "data/su2_L12_b8.json":        [("R_mean",   0.3521,     0.010)],
              "data/p1_su3_fss_corrected.json": [("R_inf", 0.3539,     0.025)],
          }

          failures = []
          for path, checks in CANONICAL.items():
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"SKIP {path} (not found)")
                  continue
              data = json.loads(p.read_text())
              for key, expected, tol in checks:
                  val = data.get(key)
                  if val is None:
                      print(f"SKIP {path}[{key}] (key absent)")
                      continue
                  if abs(float(val) - expected) > tol:
                      failures.append(
                          f"REGRESS {path}[{key}]: got {val}, expected {expected}±{tol}"
                      )
                  else:
                      print(f"OK {path}[{key}] = {val}")

          if failures:
              print("\n".join(failures)); sys.exit(1)
          EOF

  # ── Job 2: LaTeX compile (theory paper) ─────────────────────────────────────
  latex-theory:
    name: LaTeX — Theoretical Framework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live (minimal + required packages)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended \
            texlive-latex-extra texlive-science texlive-fonts-recommended \
            texlive-bibtex-extra biber

      - name: Compile Theoretical_Framework
        working-directory: paper
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error Theoretical_Framework.tex
          bibtex Theoretical_Framework
          pdflatex -interaction=nonstopmode -halt-on-error Theoretical_Framework.tex
          pdflatex -interaction=nonstopmode -halt-on-error Theoretical_Framework.tex
          echo "Pages: $(pdfinfo Theoretical_Framework.pdf | grep Pages | awk '{print $2}')"

      - name: Check for undefined references
        working-directory: paper
        run: |
          if grep -q "undefined" Theoretical_Framework.log; then
            grep "undefined" Theoretical_Framework.log
            exit 1
          fi
          echo "No undefined references."

  # ── Job 3: LaTeX compile (empirical paper) ──────────────────────────────────
  latex-empirical:
    name: LaTeX — Empirical Study
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended \
            texlive-latex-extra texlive-science texlive-fonts-recommended \
            texlive-bibtex-extra biber

      - name: Compile Empirical_Study
        working-directory: paper
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error Empirical_Study.tex
          bibtex Empirical_Study
          pdflatex -interaction=nonstopmode -halt-on-error Empirical_Study.tex
          pdflatex -interaction=nonstopmode -halt-on-error Empirical_Study.tex

      - name: Check for undefined references
        working-directory: paper
        run: |
          if grep -q "undefined" Empirical_Study.log; then
            grep "undefined" Empirical_Study.log
            exit 1
          fi
          echo "No undefined references."

